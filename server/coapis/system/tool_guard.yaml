    - *id002
    exceptions:
    - *id001
  truncate:
    level: L1
    desc: 截断文件
    action: audit
    demotion_rules:
    - *id002
    exceptions:
    - *id001
  curl:
    level: L2
    desc: HTTP 请求
    action: confirm
    demotion_rules:
    - &id003
      id: in_workspace
      desc: 仅在自己的 workspace 内操作
      level: L0
      action: audit
      scope: workspace
    exceptions:
    - id: network_post
      desc: POST/PUT/DELETE 等写入请求需要确认
      level: L2
      action: confirm
      patterns:
      - \b(curl|wget)\s+.*-X\s+(POST|PUT|DELETE|PATCH)
      - \bcurl\s+.*(--data|--data-raw|--data-binary|--data-urlencode|--form)
    - id: dangerous_output
      desc: 输出到系统目录需要拦截
      level: L4
      action: block
      patterns:
      - \b(curl|wget)\s+.*-o\s+(/etc/|/usr/|/bin/|/sbin/|/lib/|/boot/|/sys/|/dev/|/proc/)
  wget:
    level: L2
    desc: 下载文件
    action: confirm
    demotion_rules:
    - *id003
    exceptions:
    - id: dangerous_output
      desc: 下载到系统目录需要拦截
      level: L4
      action: block
      patterns:
      - \bwget\s+.*-O\s+(/etc/|/usr/|/bin/|/sbin/|/lib/|/boot/|/sys/|/dev/|/proc/)
