    action: confirm
  gcc:
    level: L2
    desc: C 编译器
    action: confirm
  make:
    level: L2
    desc: 构建工具
    action: confirm
  cmake:
    level: L2
    desc: CMake 构建
    action: confirm
  cargo:
    level: L2
    desc: Rust 包管理
    action: confirm
  go:
    level: L2
