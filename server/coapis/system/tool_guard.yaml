version: 1.0.0
description: Unified tool guard configuration — combines command levels, detection rules, and evasion checks
access_control:
  enabled: true
  guarded_tools: []
  denied_tools: []
  custom_rules: []
  disabled_rules: []
commands:
  ls:
    level: L0
    desc: 列出目录内容
    action: allow
  cat:
    level: L0
    desc: 查看文件内容
    action: allow
  head:
    level: L0
    desc: 查看文件头部
    action: allow
  tail:
    level: L0
    desc: 查看文件尾部
    action: allow
  grep:
    level: L0
    desc: 文本搜索
    action: allow
  find:
    level: L0
    desc: 查找文件
    action: allow
  wc:
    level: L0
    desc: 统计行数/词数
    action: allow
  echo:
    level: L0
    desc: 输出文本
    action: allow
  pwd:
    level: L0
    desc: 显示当前目录
    action: allow
  which:
    level: L0
    desc: 查找命令路径
    action: allow
  whoami:
    level: L0
    desc: 显示当前用户
    action: allow
  date:
    level: L0
    desc: 显示日期时间
    action: allow
  env:
    level: L0
    desc: 显示环境变量
    action: allow
  printenv:
    level: L0
    desc: 打印环境变量
    action: allow
  file:
    level: L0
    desc: 识别文件类型
    action: allow
  stat:
    level: L0
    desc: 显示文件信息
    action: allow
  diff:
    level: L0
    desc: 比较文件差异
    action: allow
  sort:
    level: L0
    desc: 排序文本行
    action: allow
  uniq:
    level: L0
    desc: 去重文本行
    action: allow
  awk:
    level: L0
    desc: 文本处理
    action: allow
  sed:
    level: L0
    desc: 流编辑器
    action: allow
  mkdir:
    level: L1
    desc: 创建目录
    action: audit
  touch:
    level: L1
    desc: 创建/更新文件时间戳
    action: audit
  cp:
    level: L1
    desc: 复制文件
    action: audit
  mv:
    level: L2
    desc: 移动/重命名文件
    action: confirm
    exceptions:
    - id: mv_system
      desc: 覆盖系统文件
      level: L4
      action: block
      patterns:
      - \s/(etc|usr|bin|sbin|boot|lib)\b
    demotion_rules:
    - id: mv_workspace
      desc: 工作空间内移动
      level: L1
      action: audit
      scope: workspace
  ln:
    level: L1
    desc: 创建链接
    action: audit
    exceptions:
    - id: ln_system
      desc: 链接到系统目录
      level: L4
      action: block
      patterns:
      - ln\b.*/(etc|usr|bin|sbin|boot)\b
    - id: ln_force
      desc: 强制覆盖链接
      level: L2
      action: confirm
      patterns:
      - ln\s+-f\b
      - ln\s+--force\b
  chmod:
    level: L1
    desc: 修改文件权限
    action: audit
    exceptions:
    - id: chmod_777
      desc: 全局可写权限
      level: L3
      action: block
      patterns:
      - chmod\s+777\b
      - chmod\s+a\+w
    - id: chmod_recursive
      desc: 递归修改权限
      level: L2
      action: confirm
      patterns:
      - chmod\s+-R\b
      - chmod\s+--recursive
    - id: chmod_system
      desc: 修改系统文件权限
      level: L4
      action: block
      patterns:
      - chmod\b.*/(etc|usr|bin|sbin|boot|lib)\b
  chown:
    level: L1
    desc: 修改文件所有者
    action: audit
    exceptions:
    - id: chown_system
      desc: 修改系统文件所有者
      level: L4
      action: block
      patterns:
      - chown\b.*/(etc|usr|bin|sbin|boot|lib)\b
      - chown\s+root\b.*/
    - id: chown_recursive
      desc: 递归修改所有者
      level: L2
      action: confirm
      patterns:
      - chown\s+-R\b
      - chown\s+--recursive
  tee:
    level: L1
    desc: 输出到文件和标准输出
    action: audit
  truncate:
    level: L1
    desc: 截断文件
    action: audit
  curl:
    level: L2
    desc: HTTP 请求
    action: confirm
    exceptions:
    - id: curl_pipe_bash
      desc: 管道执行脚本
      level: L4
      action: block
      patterns:
      - curl\b.*\|\s*(bash|sh|zsh|python|perl|ruby)
      - curl\b.*\|\s*xargs
    demotion_rules:
    - id: curl_readonly
      desc: 只读GET请求
      level: L1
      action: audit
      exclude_patterns:
      - -X\s+(POST|PUT|DELETE|PATCH)
      - -d\s
      - --data
      - --upload-file
      - -T\s
      - -F\s
      - --form
  wget:
    level: L2
    desc: 下载文件
    action: confirm
    exceptions:
    - id: wget_pipe_bash
      desc: 管道执行脚本
      level: L4
      action: block
      patterns:
      - wget\b.*\|\s*(bash|sh|zsh|python|perl|ruby)
      - wget\b.*-O\s*-\s*\|\s*(bash|sh)
    demotion_rules:
    - id: wget_readonly
      desc: 纯下载文件
      level: L1
      action: audit
      exclude_patterns:
      - --post-data
      - --post-file
      - --body-file
  git:
    level: L2
    desc: 版本控制
    action: confirm
    sub_commands:
      status:
        level: L0
        action: allow
        desc: 查看工作区状态
      log:
        level: L0
        action: allow
        desc: 查看提交日志
      show:
        level: L0
        action: allow
        desc: 查看提交详情
      diff:
        level: L0
        action: allow
        desc: 查看差异
      branch:
        level: L0
        action: allow
        desc: 查看/列出分支
      tag:
        level: L0
        action: allow
        desc: 查看/列出标签
      blame:
        level: L0
        action: allow
        desc: 查看行归属
      shortlog:
        level: L0
        action: allow
        desc: 提交统计
      describe:
        level: L0
        action: allow
        desc: 描述最近标签
      ls-files:
        level: L0
        action: allow
        desc: 列出跟踪文件
      ls-remote:
        level: L0
        action: allow
        desc: 列出远程引用
      remote:
        level: L0
        action: allow
        desc: 查看远程仓库
      rev-parse:
        level: L0
        action: allow
        desc: 解析引用
      add:
        level: L1
        action: audit
        desc: 暂存文件
      commit:
        level: L1
        action: audit
        desc: 提交变更
      stash:
        level: L1
        action: audit
        desc: 暂存工作区
      checkout:
        level: L1
        action: audit
        desc: 切换分支/恢复文件
      switch:
        level: L1
        action: audit
        desc: 切换分支
      restore:
        level: L1
        action: audit
        desc: 恢复文件
      merge:
        level: L1
        action: audit
        desc: 合并分支
      rebase:
        level: L1
        action: audit
        desc: 变基
      cherry-pick:
        level: L1
        action: audit
        desc: 拣选提交
      revert:
        level: L1
        action: audit
        desc: 撤销提交
      clean:
        level: L1
        action: audit
        desc: 清理未跟踪文件
      init:
        level: L1
        action: audit
        desc: 初始化仓库
      config:
        level: L1
        action: audit
        desc: 配置仓库
      push:
        level: L2
        action: confirm
        desc: 推送到远程
      pull:
        level: L2
        action: confirm
        desc: 从远程拉取
      fetch:
        level: L2
        action: confirm
        desc: 获取远程更新
      clone:
        level: L2
        action: confirm
        desc: 克隆仓库
      reset:
        level: L3
        action: confirm
        desc: 重置工作区（可能丢失变更）
  python:
    level: L2
    desc: Python 解释器
    action: confirm
    sub_commands:
      file:
        level: L1
        action: audit
        desc: 执行脚本文件
  python3:
    level: L2
    desc: Python3 解释器
    action: confirm
    sub_commands:
      file:
        level: L1
        action: audit
        desc: 执行脚本文件
  pip:
    level: L2
    desc: Python 包管理
    action: confirm
    sub_commands:
      list:
        level: L0
        action: allow
        desc: 列出已安装包
      show:
        level: L0
        action: allow
        desc: 查看包信息
      freeze:
        level: L0
        action: allow
        desc: 导出依赖列表
      check:
        level: L0
        action: allow
        desc: 检查依赖兼容性
      install:
        level: L2
        action: confirm
        desc: 安装包
      uninstall:
        level: L2
        action: confirm
        desc: 卸载包
      download:
        level: L1
        action: audit
        desc: 下载包（不安装）
  pip3:
    level: L2
    desc: Python3 包管理
    action: confirm
    sub_commands:
      list:
        level: L0
        action: allow
        desc: 列出已安装包
      show:
        level: L0
        action: allow
        desc: 查看包信息
      freeze:
        level: L0
        action: allow
        desc: 导出依赖列表
      check:
        level: L0
        action: allow
        desc: 检查依赖兼容性
      install:
        level: L2
        action: confirm
        desc: 安装包
      uninstall:
        level: L2
        action: confirm
        desc: 卸载包
      download:
        level: L1
        action: audit
        desc: 下载包（不安装）
  node:
    level: L2
    desc: Node.js 运行时
    action: confirm
    sub_commands:
      file:
        level: L1
        action: audit
        desc: 执行脚本文件
  npm:
    level: L2
    desc: Node 包管理
    action: confirm
    sub_commands:
      list:
        level: L0
        action: allow
        desc: 列出已安装包
      ls:
        level: L0
        action: allow
        desc: 列出已安装包
      view:
        level: L0
        action: allow
        desc: 查看包信息
      info:
        level: L0
        action: allow
        desc: 查看包信息
      outdated:
        level: L0
        action: allow
        desc: 查看过期包
      doctor:
        level: L0
        action: allow
        desc: 诊断环境
      config:
        level: L0
        action: allow
        desc: 查看配置
      version:
        level: L0
        action: allow
        desc: 查看版本
      install:
        level: L2
        action: confirm
        desc: 安装依赖
      i:
        level: L2
        action: confirm
        desc: 安装依赖（简写）
      ci:
        level: L2
        action: confirm
        desc: 干净安装
      uninstall:
        level: L2
        action: confirm
        desc: 卸载依赖
      update:
        level: L2
        action: confirm
        desc: 更新依赖
      publish:
        level: L2
        action: confirm
        desc: 发布包
      run:
        level: L1
        action: audit
        desc: 运行脚本
      start:
        level: L1
        action: audit
        desc: 启动项目
      test:
        level: L1
        action: audit
        desc: 运行测试
      build:
        level: L1
        action: audit
        desc: 构建项目
  npx:
    level: L2
    desc: Node 包执行
    action: confirm
  java:
    level: L2
    desc: Java 运行时
    action: confirm
  javac:
    level: L2
    desc: Java 编译器
    action: confirm
  gcc:
    level: L2
    desc: C 编译器
    action: confirm
  make:
    level: L2
    desc: 构建工具
    action: confirm
  cmake:
    level: L2
    desc: CMake 构建
    action: confirm
  cargo:
    level: L2
    desc: Rust 包管理
    action: confirm
    sub_commands:
      version:
        level: L0
        action: allow
        desc: 查看版本
      search:
        level: L0
        action: allow
        desc: 搜索包
      doc:
        level: L0
        action: allow
        desc: 生成文档
      tree:
        level: L0
        action: allow
        desc: 查看依赖树
      build:
        level: L1
        action: audit
        desc: 编译项目
      check:
        level: L1
        action: audit
        desc: 检查代码
      test:
        level: L1
        action: audit
        desc: 运行测试
      clippy:
        level: L1
        action: audit
        desc: Lint检查
      fmt:
        level: L1
        action: audit
        desc: 格式化代码
      clean:
        level: L1
        action: audit
        desc: 清理构建
      install:
        level: L2
        action: confirm
        desc: 安装包
      uninstall:
        level: L2
        action: confirm
        desc: 卸载包
      publish:
        level: L2
        action: confirm
        desc: 发布包
  go:
    level: L2
    desc: Go 工具链
    action: confirm
    sub_commands:
      version:
        level: L0
        action: allow
        desc: 查看版本
      env:
        level: L0
        action: allow
        desc: 查看环境变量
      list:
        level: L0
        action: allow
        desc: 列出包
      build:
        level: L1
        action: audit
        desc: 编译项目
      test:
        level: L1
        action: audit
        desc: 运行测试
      vet:
        level: L1
        action: audit
        desc: 静态检查
      fmt:
        level: L1
        action: audit
        desc: 格式化代码
      clean:
        level: L1
        action: audit
        desc: 清理构建
      get:
        level: L2
        action: confirm
        desc: 获取依赖
      install:
        level: L2
        action: confirm
        desc: 安装包
  ruby:
    level: L2
    desc: Ruby 解释器
    action: confirm
  perl:
    level: L2
    desc: Perl 解释器
    action: confirm
  php:
    level: L2
    desc: PHP 解释器
    action: confirm
  bash:
    level: L2
    desc: Bash shell
    action: confirm
  sh:
    level: L2
    desc: Shell
    action: confirm
  source:
    level: L2
    desc: 执行脚本
    action: confirm
  ssh:
    level: L2
    desc: 远程登录
    action: confirm
    exceptions:
    - id: ssh_root
      desc: root远程登录
      level: L4
      action: block
      patterns:
      - ssh\s+root@
      - ssh\s+.*-l\s+root
  scp:
    level: L2
    desc: 远程复制
    action: confirm
  rsync:
    level: L2
    desc: 远程同步
    action: confirm
  crontab:
    level: L2
    desc: 定时任务管理
    action: confirm
  at:
    level: L2
    desc: 定时执行
    action: confirm
  jq:
    level: L2
    desc: JSON 处理
    action: confirm
  yq:
    level: L2
    desc: YAML 处理
    action: confirm
  xmllint:
    level: L2
    desc: XML 处理
    action: confirm
  rm:
    level: L3
    desc: 删除文件/目录
    action: confirm
    exceptions:
    - id: rm_system_critical
      desc: 禁止删除系统关键路径
      level: L4
      action: block
      patterns:
      - \s/(etc|usr|bin|sbin|boot|lib|var/lib|opt)\b
      - \s--no-preserve-root
      - \s/\s*$
    demotion_rules:
    - id: rm_tmp
      desc: 临时目录删除放行
      level: L0
      action: allow
      safe_paths:
      - /tmp/
      - /var/tmp/
    - id: rm_workspace
      desc: 工作空间内删除仅记录
      level: L1
      action: audit
      scope: workspace
  rmdir:
    level: L3
    desc: 删除空目录
    action: confirm
    exceptions:
    - id: rmdir_system
      desc: 禁止删除系统目录
      level: L4
      action: block
      patterns:
      - \s/(etc|usr|bin|sbin|boot|lib)\b
    demotion_rules:
    - id: rmdir_tmp
      desc: 临时目录
      level: L0
      action: allow
      safe_paths:
      - /tmp/
      - /var/tmp/
    - id: rmdir_workspace
      desc: 工作空间内删除空目录
      level: L1
      action: audit
      scope: workspace
  tar:
    level: L3
    desc: 归档压缩
    action: audit
    exceptions:
    - id: tar_write_system
      desc: 解压到系统目录
      level: L4
      action: block
      patterns:
      - \s-C\s+/(etc|usr|bin|sbin|boot|lib)\b
    - id: tar_extract
      desc: 解压归档
      level: L2
      action: confirm
      patterns:
      - \s-x\b
      - \s--extract\b
      - \s-[a-zA-Z]*x[a-zA-Z]*\b
    demotion_rules:
    - id: tar_readonly
      desc: 只读查看归档
      level: L0
      action: allow
      patterns:
      - \s-t\b
      - \s--list\b
      - \s-tf\b
      - \s-tzf\b
  zip:
    level: L3
    desc: ZIP 压缩
    action: audit
    exceptions:
    - id: zip_system
      desc: 打包到系统目录
      level: L3
      action: block
      patterns:
      - zip\b.*/(etc|usr|bin|sbin|boot)\b
  unzip:
    level: L3
    desc: ZIP 解压
    action: audit
    exceptions:
    - id: unzip_system
      desc: 解压到系统目录
      level: L3
      action: block
      patterns:
      - unzip\b.*/(etc|usr|bin|sbin|boot)\b
  gzip:
    level: L3
    desc: GZ 压缩
    action: audit
    exceptions:
    - id: gzip_system
      desc: 压缩系统文件
      level: L3
      action: block
      patterns:
      - gzip\b.*/(etc|usr|bin|sbin|boot)\b
  gunzip:
    level: L3
    desc: GZ 解压
    action: audit
    exceptions:
    - id: gunzip_system
      desc: 解压到系统目录
      level: L3
      action: block
      patterns:
      - gunzip\b.*/(etc|usr|bin|sbin|boot)\b
  kill:
    level: L3
    desc: 终止进程
    action: confirm
    exceptions:
    - id: kill_sigkill
      desc: 强制杀死进程需拦截
      level: L4
      action: block
      patterns:
      - \s-9\b
      - \s-SIGKILL\b
      - \s-KILL\b
  killall:
    level: L3
    desc: 按名称终止进程
    action: confirm
    exceptions:
    - id: killall_sigkill
      desc: 强制杀死全部进程
      level: L4
      action: block
      patterns:
      - \s-9\b
      - \s-SIGKILL\b
      - \s-KILL\b
  pkill:
    level: L3
    desc: 按模式终止进程
    action: confirm
    exceptions:
    - id: pkill_sigkill
      desc: 强制杀死进程
      level: L4
      action: block
      patterns:
      - \s-9\b
      - \s-SIGKILL\b
      - \s-KILL\b
      - \s--signal\s+KILL
  nohup:
    level: L3
    desc: 后台运行
    action: audit
  screen:
    level: L3
    desc: 终端复用
    action: audit
  tmux:
    level: L3
    desc: 终端复用
    action: audit
  iptables:
    level: L3
    desc: 防火墙规则
    action: block
  ufw:
    level: L3
    desc: 防火墙管理
    action: block
  nc:
    level: L3
    desc: 网络调试
    action: audit
  nmap:
    level: L3
    desc: 端口扫描
    action: block
  tcpdump:
    level: L3
    desc: 抓包分析
    action: audit
  dd:
    level: L3
    desc: 磁盘复制
    action: block
    demotion_rules:
    - id: dd_workspace
      desc: 工作空间内操作
      level: L2
      action: confirm
      scope: workspace
    - id: dd_tmp
      desc: 临时目录操作
      level: L1
      action: audit
      safe_paths:
      - /tmp/
      - /var/tmp/
  mkfs:
    level: L3
    desc: 格式化磁盘
    action: block
  fdisk:
    level: L3
    desc: 磁盘分区
    action: block
  fsck:
    level: L3
    desc: 磁盘检查
    action: block
  docker:
    level: L4
    desc: 容器管理
    action: confirm
    exceptions:
    - id: docker_rm_volume
      desc: 删除卷/网络需拦截
      level: L4
      action: block
      patterns:
      - docker\s+(volume\s+rm|network\s+rm|system\s+prune\s+-a)
      - docker\s+rm\s+-f\s
    demotion_rules:
    - id: docker_readonly
      desc: 只读查看
      level: L0
      action: allow
      patterns:
      - docker\s+(ps|images|info|version|inspect|logs|stats|top)\b
  docker-compose:
    level: L4
    desc: 容器编排
    action: confirm
    exceptions:
    - id: dc_down_v
      desc: 删除卷
      level: L4
      action: block
      patterns:
