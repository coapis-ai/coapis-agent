  apt-get:
    level: L4
    desc: Debian 包管理
    action: block
  yum:
    level: L4
    desc: RPM 包管理
    action: block
  dnf:
    level: L4
    desc: RPM 包管理
    action: block
  pacman:
    level: L4
    desc: Arch 包管理
    action: block
  rpm:
    level: L4
    desc: RPM 包操作
    action: block
  dpkg:
    level: L4
    desc: Debian 包操作
    action: block
  snap:
    level: L4
    desc: Snap 包管理
    action: block
  flatpak:
    level: L4
    desc: Flatpak 包管理
