version: 1.0.0
description: Unified tool guard configuration — combines command levels, detection
  rules, and evasion checks
access_control:
  enabled: true
  guarded_tools: []
  denied_tools: []
  custom_rules: []
  disabled_rules: []
commands:
  ls:
    level: L0
    desc: 列出目录内容
    action: allow
    exceptions:
    - &id001
      id: system_paths
      desc: 目标路径为系统/全局目录
      level: L4
      action: block
      patterns:
      - \s/(etc|usr|bin|sbin|lib|lib64|opt|boot|sys|dev|proc|var/run|var/log|var/lib|var/spool)/
      - \s/\.\./
      - \s~\/\.\.
      - ^\s*rm\s+.*\s+/\s*
      exclude_patterns:
      - /\.coapis/workspaces/
      - /\.coapis/agents/
  cat:
    level: L0
    desc: 查看文件内容
    action: allow
    exceptions:
    - *id001
  head:
    level: L0
    desc: 查看文件头部
    action: allow
    exceptions:
    - *id001
  tail:
    level: L0
    desc: 查看文件尾部
    action: allow
    exceptions:
    - *id001
  grep:
    level: L0
    desc: 文本搜索
    action: allow
    exceptions:
    - *id001
  find:
    level: L0
    desc: 查找文件
    action: allow
    exceptions:
    - *id001
  wc:
    level: L0
    desc: 统计行数/词数
    action: allow
  echo:
    level: L0
    desc: 输出文本
    action: allow
  pwd:
    level: L0
    desc: 显示当前目录
    action: allow
  which:
    level: L0
    desc: 查找命令路径
    action: allow
  whoami:
    level: L0
    desc: 显示当前用户
    action: allow
  date:
    level: L0
    desc: 显示日期时间
    action: allow
  env:
    level: L0
    desc: 显示环境变量
    action: allow
  printenv:
    level: L0
    desc: 打印环境变量
    action: allow
  file:
    level: L0
    desc: 识别文件类型
    action: allow
  stat:
    level: L0
    desc: 显示文件信息
    action: allow
    exceptions:
    - *id001
  diff:
    level: L0
    desc: 比较文件差异
    action: allow
  sort:
    level: L0
    desc: 排序文本行
    action: allow
  uniq:
    level: L0
    desc: 去重文本行
    action: allow
  awk:
    level: L0
    desc: 文本处理
    action: allow
  sed:
    level: L0
    desc: 流编辑器
    action: allow
  mkdir:
    level: L1
    desc: 创建目录
    action: audit
    demotion_rules:
    - &id002
      id: in_workspace
      desc: 仅在自己的 workspace 内操作
      level: L0
      action: allow
      scope: workspace
    exceptions:
    - *id001
  touch:
    level: L1
    desc: 创建/更新文件时间戳
    action: audit
    demotion_rules:
    - *id002
    exceptions:
    - *id001
  cp:
    level: L1
    desc: 复制文件
    action: audit
    demotion_rules:
    - *id002
    exceptions:
    - *id001
  mv:
    level: L2
    desc: 移动/重命名文件
    action: confirm
    demotion_rules:
    - *id002
    exceptions:
    - *id001
    - &id006
      id: dangerous_rm
      desc: 危险的递归删除
      level: L4
      action: block
      patterns:
      - \brm\s+.*\s+-[a-zA-Z]*r[a-zA-Z]*\s+(?:/|/\.\*|/\*+|~|~/?\.\*|~/?\*+)
      - \brm\s+.*\s+(?:/|/\.\*|/\*+|~|~/?\.\*|~/?\*+)\s+-[a-zA-Z]*r
  ln:
    level: L1
    desc: 创建链接
    action: audit
    demotion_rules:
    - *id002
    exceptions:
    - *id001
  chmod:
    level: L1
    desc: 修改文件权限
    action: audit
    demotion_rules:
    - *id002
    exceptions:
    - *id001
  chown:
    level: L1
    desc: 修改文件所有者
    action: audit
    demotion_rules:
    - *id002
    exceptions:
    - *id001
  tee:
    level: L1
    desc: 输出到文件和标准输出
