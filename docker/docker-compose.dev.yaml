# ═══════════════════════════════════════════════════════════════════
# CoApis 开发测试环境 Docker Compose
# ── 端口: nginx=4300, server=4308 ──
# ── 数据: /apps/ai/coapis-dev (bind mount) ──
# ── Playwright: 共享生产环境 (172.17.0.1:9222) ──
# ── 源码热更新: 后端代码修改后自动重载 ──
# 用法: cd docker && docker compose -f docker-compose.dev.yaml up -d
# ═══════════════════════════════════════════════════════════════════

name: coapis-dev

services:
  # ── 前端构建（一次性，编译完即退出） ──
  frontend-build:
    image: node:22-slim
    container_name: coapis-frontend-build-dev
    working_dir: /app
    volumes:
      - ../client:/app
    command: sh -c "npm ci && npm run build"
    networks:
      - frontend-dev

  # ── 后端 API 服务 ──
  server:
    image: coapis-server:latest
    container_name: coapis-server-dev
    ports:
      - "4308:8000"
    volumes:
      # 运行数据（开发环境独立目录）
      - /apps/ai/coapis-dev:/apps/ai/coapis
      # eaterclaw 数据（agent 配置、频道等）
      - /apps/ai/eaterclaw:/apps/ai/eaterclaw
      # 源码热更新（开发模式）
      - ../server/coapis:/app/coapis
      # 前端构建产物
      - ../client/dist:/app/coapis/console
      # 开发环境版本覆盖（0.8.7-post1）
      - ./dev-overrides/coapis/__version__.py:/app/coapis/__version__.py
      # Playwright 浏览器持久化
      - ./volume/playwright:/app/volume/playwright:ro
    environment:
      - PYTHONPATH=/app
      - COAPIS_VERSION=${COAPIS_VERSION:-0.8.28-dev}
      - COAPIS_AUTH_ENABLED=true
      - COAPIS_USER_SYSTEM_ENABLED=true
      # 共享生产 Playwright（通过宿主机 4201 端口，browserless 认证）
      - BROWSER_CDP_URL=http://172.17.0.1:4201?token=coapis
      # 文件上传限制（与 .env.dev 同步）
      - COAPIS_UPLOAD_MAX_FILES=${COAPIS_UPLOAD_MAX_FILES:-10}
      - COAPIS_UPLOAD_MAX_FILE_SIZE_MB=${COAPIS_UPLOAD_MAX_FILE_SIZE_MB:-20}
      # Web 搜索配置
      # COAPIS_WEB_SEARCH_DEFAULT_BACKEND=auto
      # COAPIS_WEB_SEARCH_BACKEND_ORDER=browser,tavily,bocha,ddgs,baidu,sogou
      # COAPIS_WEB_SEARCH_CACHE_TTL=600
      # COAPIS_WEB_SEARCH_TIMEOUT=15
      # COAPIS_WEB_SEARCH_BROWSER_ENGINE=bing
    restart: unless-stopped
    networks:
      - frontend-dev
      - internal-dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── 前端 Nginx ──
  nginx:
    image: nginx:alpine
    container_name: coapis-nginx-dev
    ports:
      - "4300:80"
    volumes:
      - ./nginx/conf/default.conf.template:/etc/nginx/conf.d/default.conf.template:ro
      - ./nginx/entrypoint.sh:/docker-entrypoint-custom.sh:ro
      - ../client/dist:/usr/share/nginx/html:ro
    entrypoint: ["/bin/sh", "/docker-entrypoint-custom.sh"]
    environment:
      - COAPIS_UPLOAD_MAX_BODY_SIZE=${COAPIS_UPLOAD_MAX_FILE_SIZE_MB:-20}
    depends_on:
      frontend-build:
        condition: service_completed_successfully
      server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend-dev
      - internal-dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  frontend-dev:
    driver: bridge
  internal-dev:
    internal: true
