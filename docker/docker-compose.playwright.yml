# ═══════════════════════════════════════════════════════════════════
# Playwright 独立服务 + CoApis 源码构建
# 用法: cd docker && docker compose -f docker-compose.playwright.yml up -d --build
# 浏览器用 browserless/chrome，支持 0.0.0.0 绑定，CDP 端口 3000
# ═══════════════════════════════════════════════════════════════════

services:
  # ── 浏览器服务（CDP 协议，端口 3000）──
  playwright:
    image: browserless/chrome:latest
    container_name: coapis-playwright
    expose:
      - "3000"
    ports:
      - "9222:3000"
    shm_size: "2g"
    environment:
      - TOKEN=coapis
      - MAX_CONCURRENT_SESSIONS=5
      - MAX_QUEUE_LENGTH=10
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ── CoApis 应用（通过 CDP 连接浏览器服务）──
  server:
    build:
      context: ..
      dockerfile: server/deploy/Dockerfile
    image: coapis-server:latest
    container_name: coapis-server
    ports:
      - "${COAPIS_SERVER_PORT:-4200}:8000"
    volumes:
      - coapis-data:/data
    env_file:
      - .env
    environment:
      - COAPIS_WORKING_DIR=/data
      - COAPIS_WORKSPACES_DIR=${COAPIS_WORKSPACES_DIR:-${COAPIS_WORKING_DIR}/workspaces}
      - BROWSER_CDP_URL=http://playwright:3000
    depends_on:
      playwright:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  coapis-data:
    driver: local
