# ═══════════════════════════════════════════════════════════════════
# CoApis 生产环境 Docker Compose（server + nginx + playwright）
# 用法: cd docker && docker compose up -d
# 说明: Nginx 负责前端静态文件 + 反向代理 API，Server 只处理 API
#       Playwright 提供浏览器自动化（CDP 协议）
# ═══════════════════════════════════════════════════════════════════

name: coapis-prod

services:
  # ── 后端 API 服务 ──
  server:
    image: coapis-server:latest
    container_name: coapis-server
    ports:
      - "${COAPIS_SERVER_PORT:-4208}:8000"
    volumes:
      - ${COAPIS_WORKING_DIR:-/apps/ai/coapis}:${COAPIS_WORKING_DIR:-/apps/ai/coapis}
      - ./volume/playwright:/app/volume/playwright:ro
      # MCP包缓存持久化（避免容器重建后重新下载）
      - ./volume/mcp:/root/.cache/pip
      # SEM 代码挂载（开发测试用）
      - ../server/coapis/agents/session_execution:/app/coapis/agents/session_execution
      # SEM 集成到 react_agent.py（开发测试用）
      - ../server/coapis/agents/react_agent.py:/app/coapis/agents/react_agent.py
      # workspace_guard.py 技能路径权限修复
      - ../server/coapis/agents/security/workspace_guard.py:/app/coapis/agents/security/workspace_guard.py
    env_file:
      - .env
    environment:
      - COAPIS_WORKING_DIR=${COAPIS_WORKING_DIR:-/apps/ai/coapis}
      - COAPIS_WORKSPACES_DIR=${COAPIS_WORKSPACES_DIR:-${COAPIS_WORKING_DIR}/workspaces}
      - BROWSER_CDP_URL=http://playwright:9223
      # MCP包缓存目录（持久化到宿主机）
      - PIP_CACHE_DIR=/root/.cache/pip
    restart: unless-stopped
    networks:
      - frontend
      - internal
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── 前端 Nginx ──
  nginx:
    image: nginx:alpine
    container_name: coapis-nginx
    ports:
      - "${COAPIS_WEB_PORT:-4200}:80"
    volumes:
      - ./nginx/conf/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ../client/dist:/usr/share/nginx/html:ro
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── 浏览器服务（CDP 协议）──
  # chromedp/headless-shell 内部：9223(socat) → 9222(Chrome CDP)
  # shm_size: Chrome 必需，低于 512M 会崩溃
  playwright:
    image: chromedp/headless-shell:latest
    container_name: coapis-playwright
    expose:
      - "9223"
    ports:
      - "${COAPIS_PLAYWRIGHT_PORT:-4201}:9223"
    shm_size: "2g"
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c '</dev/tcp/127.0.0.1/9223' 2>/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  frontend:
    driver: bridge
  internal:
    internal: true
