# ═══════════════════════════════════════════════════════════════════
# CoApis 生产环境 Docker Compose（server + nginx + playwright）
# 用法: cd docker && docker compose up -d
# 说明: Nginx 负责前端静态文件 + 反向代理 API，Server 只处理 API
#       Playwright 提供浏览器自动化（CDP 协议）
# ═══════════════════════════════════════════════════════════════════

name: coapis-prod

services:
  # ── 后端 API 服务 ──
  # 镜像选择（在 .env 中设置 COAPIS_IMAGE）：
  #   coapis-agent:VERSION      — 全量镜像（离线可用，~2GB）
  #   coapis-agent_min:VERSION  — 最小镜像（快速安装，~1GB，首次启动联网装渠道包）
  server:
    image: ${COAPIS_IMAGE:-coapis-agent:latest}
    container_name: coapis-server
    ports:
      - "${COAPIS_SERVER_PORT:-4208}:8000"
    volumes:
      - ${COAPIS_WORKING_DIR:-/apps/ai/coapis}:${COAPIS_WORKING_DIR:-/apps/ai/coapis}
      - ./volume/playwright:/app/volume/playwright:ro
      # MCP包缓存持久化（避免容器重建后重新下载）
      - ./volume/mcp:/root/.cache/pip
    env_file:
      - .env
    environment:
      - COAPIS_WORKING_DIR=${COAPIS_WORKING_DIR:-/apps/ai/coapis}
      - COAPIS_WORKSPACES_DIR=${COAPIS_WORKSPACES_DIR:-${COAPIS_WORKING_DIR}/workspaces}
      - BROWSER_CDP_URL=http://playwright:3000
      # MCP包缓存目录（持久化到宿主机）
      - PIP_CACHE_DIR=/root/.cache/pip
    restart: unless-stopped
    networks:
      - frontend
      - internal
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── 前端 Nginx ──
  nginx:
    image: nginx:alpine
    container_name: coapis-nginx
    ports:
      - "${COAPIS_WEB_PORT:-4200}:80"
    volumes:
      - ./nginx/conf/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ../client/dist:/usr/share/nginx/html:ro
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── 浏览器服务（CDP 协议，内部端口 3000）──
  # browserless/chrome 提供完整 HTTP API + CDP 支持
  # shm_size: Chrome 必需，低于 512M 会崩溃
  # 注意：internal 网络已隔离外部访问，无需 TOKEN 认证
  playwright:
    image: browserless/chrome:latest
    container_name: coapis-playwright
    expose:
      - "3000"
    ports:
      - "${COAPIS_PLAYWRIGHT_PORT:-4201}:3000"
    shm_size: "2g"
    environment:
      - MAX_CONCURRENT_SESSIONS=5
      - MAX_QUEUE_LENGTH=10
    restart: unless-stopped
    networks:
      - internal
      - frontend
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/json/version"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

networks:
  frontend:
    driver: bridge
  internal:
    internal: true
