# ═══════════════════════════════════════════════════════════════════
# CoApis 生产环境 Docker Compose（server + nginx + playwright）
# ── 端口: nginx=4200, server=4208, playwright=4201 ──
# ── 数据: /apps/ai/coapis (named volume) ──
# ── Playwright: 独立容器（dev 通过 172.17.0.1:4201 共享访问）──
# 用法: cd docker && docker compose -f docker-compose.prod.yaml up -d
# ═══════════════════════════════════════════════════════════════════

services:
  # ── 后端 API 服务 ──
  server:
    image: coapis-server:latest
    container_name: coapis-server-prod
    ports:
      - "4208:8000"
    volumes:
      - coapis-data:/apps/ai/coapis
      - ./volume/playwright:/app/volume/playwright:ro
    env_file:
      - .env.prod
    environment:
      - BROWSER_CDP_URL=http://playwright:9223
    restart: unless-stopped
    networks:
      - frontend
      - internal
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── 前端 Nginx ──
  nginx:
    image: nginx:alpine
    container_name: coapis-nginx-prod
    ports:
      - "4200:80"
    volumes:
      - ./nginx/conf/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ../client/dist:/usr/share/nginx/html:ro
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── 浏览器服务（CDP 协议）──
  # chromedp/headless-shell: 9223(socat) → 9222(Chrome CDP)
  # shm_size: Chrome 必需，低于 512M 会崩溃
  playwright:
    image: chromedp/headless-shell:latest
    container_name: coapis-playwright-prod
    expose:
      - "9223"
    ports:
      - "4201:9223"
    shm_size: "2g"
    restart: unless-stopped
    networks:
      - frontend
      - internal
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c '</dev/tcp/127.0.0.1/9223' 2>/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  frontend:
    driver: bridge
  internal:
    internal: true

volumes:
  coapis-data:
    driver: local
