# ═══════════════════════════════════════════════════════════════════
# CoApis 生产环境 Docker Compose（server + nginx + playwright）
# ── 端口: nginx=4200, server=4208, playwright=4201 ──
# ── 数据: /apps/ai/coapis (named volume) ──
# ── Playwright: 独立容器（dev 通过 172.17.0.1:4201 共享访问）──
# 用法: cd docker && docker compose -f docker-compose.prod.yaml up -d
# ═══════════════════════════════════════════════════════════════════

services:
  # ── 后端 API 服务 ──
  server:
    image: coapis-server:latest
    container_name: coapis-server-prod
    ports:
      - "4208:8000"
    volumes:
      - coapis-data:/apps/ai/coapis
      - ./volume/playwright:/app/volume/playwright:ro
    env_file:
      - .env.prod
    environment:
      - BROWSER_CDP_URL=http://playwright:3000
    restart: unless-stopped
    networks:
      - frontend
      - internal
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── 前端 Nginx ──
  nginx:
    image: nginx:alpine
    container_name: coapis-nginx-prod
    ports:
      - "4200:80"
    volumes:
      - ./nginx/conf/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ../client/dist:/usr/share/nginx/html:ro
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── 浏览器服务（CDP 协议）──
  # browserless/chrome: 专业级 Headless Chrome，支持 0.0.0.0 绑定
  # 端口 3000 暴露 CDP，外部通过 4201 访问
  playwright:
    image: browserless/chrome:latest
    container_name: coapis-playwright-prod
    expose:
      - "3000"
    ports:
      - "4201:3000"
    shm_size: "2g"
    environment:
      - TOKEN=coapis
      - MAX_CONCURRENT_SESSIONS=5
      - MAX_QUEUE_LENGTH=10
    restart: unless-stopped
    networks:
      - frontend
      - internal
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/json/version?token=coapis"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

networks:
  frontend:
    driver: bridge
  internal:
    internal: true

volumes:
  coapis-data:
    driver: local
