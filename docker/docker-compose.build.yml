# ═══════════════════════════════════════════════════════════════════
# CoApis 源码构建 Docker Compose
# 用法: cd docker && docker compose -f docker-compose.build.yml up -d --build
# 适用: 开发者、需要定制的高级用户
# ═══════════════════════════════════════════════════════════════════

services:
  server:
    build:
      context: ..
      dockerfile: server/deploy/Dockerfile
    image: coapis-server:latest
    container_name: coapis-server
    ports:
      - "${COAPIS_SERVER_PORT:-4200}:8000"
    volumes:
      - ${COAPIS_WORKING_DIR}:${COAPIS_WORKING_DIR}
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

