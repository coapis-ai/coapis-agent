# ═══════════════════════════════════════════════════════════════════
# CoApis 企业内部生产环境 Docker Compose
# 用法: cd docker && docker compose -f docker-compose-mycom.yml up -d
# 说明: 企业内部部署，端口区间 4880-4889
# ═══════════════════════════════════════════════════════════════════

name: coapis-mycom

services:
  # ── 后端 API 服务 ──
  server:
    image: ${COAPIS_IMAGE:-coapis-agent:latest}
    container_name: coapis-mycom-server
    ports:
      - "${COAPIS_SERVER_PORT:-4888}:8000"
    volumes:
      - ${COAPIS_WORKING_DIR}:${COAPIS_WORKING_DIR}
      - ./volume/playwright:/app/volume/playwright:ro
      # MCP包缓存持久化
      - ./volume/mcp:/root/.cache/pip
    env_file:
      - .env.mycom
      - .env.mycom
    environment:
      - COAPIS_WORKING_DIR=${COAPIS_WORKING_DIR}
      - COAPIS_WORKSPACES_DIR=${COAPIS_WORKSPACES_DIR:-${COAPIS_WORKING_DIR}/workspaces}
      - BROWSER_CDP_URL=http://playwright:3000
      - PIP_CACHE_DIR=/root/.cache/pip
    restart: unless-stopped
    networks:
      - frontend
      - internal
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── 前端 Nginx ──
  nginx:
    image: nginx:alpine
    container_name: coapis-mycom-nginx
    ports:
      - "${COAPIS_WEB_PORT:-4880}:80"
    volumes:
      - ./nginx/conf/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ../client/dist:/usr/share/nginx/html:ro
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── 浏览器服务（CDP 协议）──
  playwright:
    image: browserless/chrome:latest
    container_name: coapis-mycom-playwright
    expose:
      - "3000"
    ports:
      - "${COAPIS_PLAYWRIGHT_PORT:-4881}:3000"
    shm_size: "2g"
    environment:
      - MAX_CONCURRENT_SESSIONS=10
      - MAX_QUEUE_LENGTH=20
      - CONNECTION_TIMEOUT=600000
    restart: unless-stopped
    networks:
      - internal
      - frontend
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/json/version"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

networks:
  frontend:
    driver: bridge
  internal:
    internal: true
