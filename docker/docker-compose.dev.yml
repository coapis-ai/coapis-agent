# ═══════════════════════════════════════════════════════════════════
# CoApis 开发环境 Docker Compose（源码挂载，热更新）
# 用法: cd docker && docker compose -f docker-compose.dev.yml up -d
# 端口: Web=4300, API=4308, Playwright=4201
# ═══════════════════════════════════════════════════════════════════

name: coapis-dev

services:
  # ── 后端 API 服务（源码挂载）──
  server:
    image: ${COAPIS_IMAGE:-coapis-agent:latest}
    container_name: coapis-server-dev
    ports:
      - "${COAPIS_SERVER_PORT:-4308}:8000"
    volumes:
      # 数据目录
      - ${COAPIS_WORKING_DIR:-/apps/ai/coapis}:${COAPIS_WORKING_DIR:-/apps/ai/coapis}
      # 源码挂载（可写，entrypoint需要写__version__.py）
      - ../server/coapis:/app/coapis
      # MCP包缓存
      - ./volume/playwright:/app/volume/playwright:ro
      - ./volume/mcp:/root/.cache/pip
    env_file:
      - .env.dev
    environment:
      - COAPIS_WORKING_DIR=${COAPIS_WORKING_DIR:-/apps/ai/coapis}
      - COAPIS_WORKSPACES_DIR=${COAPIS_WORKSPACES_DIR:-${COAPIS_WORKING_DIR}/workspaces}
      - BROWSER_CDP_URL=http://playwright:3000
      - PIP_CACHE_DIR=/root/.cache/pip
      # 开发模式标识
      - COAPIS_DEV_MODE=true
    restart: unless-stopped
    networks:
      - frontend
      - internal
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── 前端 Nginx（dist目录挂载）──
  nginx:
    image: nginx:alpine
    container_name: coapis-nginx-dev
    ports:
      - "${COAPIS_WEB_PORT:-4300}:80"
    volumes:
      - ./nginx/conf/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ../client/dist:/usr/share/nginx/html:ro
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── 浏览器服务 ──
  playwright:
    image: browserless/chrome:latest
    container_name: coapis-playwright-dev
    expose:
      - "3000"
    ports:
      - "${COAPIS_PLAYWRIGHT_PORT:-4201}:3000"
    shm_size: "2g"
    environment:
      - MAX_CONCURRENT_SESSIONS=5
      - CONNECTION_TIMEOUT=60000
      - PREBOOT_CHROME=true
      - KEEP_ALIVE=true
    restart: unless-stopped
    networks:
      - internal

networks:
  frontend:
    driver: bridge
  internal:
    driver: bridge
    internal: true
