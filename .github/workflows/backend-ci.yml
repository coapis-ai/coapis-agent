name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - "server/coapis/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "server/coapis/**"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black ruff mypy

      - name: Black formatting check
        run: |
          black --check server/coapis/

      - name: Ruff linting
        run: |
          ruff check server/coapis/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov
          pip install -r server/requirements.txt 2>/dev/null || true

      - name: Run tests
        run: |
          cd server/coapis
          python -m pytest tests/ -v --cov=. --cov-report=xml 2>/dev/null || echo "No tests found yet"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          flags: backend
