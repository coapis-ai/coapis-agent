<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="h" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD23F"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>
  </defs>
  <!-- 圆角方块背景 -->
  <rect width="64" height="64" rx="14" fill="#0D1117"/>
  <!-- 六边形外框 -->
  <polygon points="32,6 56,20 56,44 32,58 8,44 8,20"
           fill="none" stroke="#FFD23F" stroke-width="1.5" opacity="0.5"/>
  <!-- 翅膀 -->
  <ellipse cx="24" cy="28" rx="7" ry="10" transform="rotate(-20, 24, 28)"
           fill="#FFD23F" opacity="0.3"/>
  <ellipse cx="40" cy="28" rx="7" ry="10" transform="rotate(20, 40, 28)"
           fill="#FFD23F" opacity="0.3"/>
  <!-- 身体三段 -->
  <polygon points="32,22 36,25 36,30 32,33 28,30 28,25" fill="url(#h)"/>
  <polygon points="32,33 37,36 37,42 32,45 27,42 27,36" fill="url(#h)"/>
  <!-- 条纹 -->
  <line x1="28" y1="39" x2="36" y2="39" stroke="#0D1117" stroke-width="1.2" opacity="0.4"/>
  <!-- 触角 -->
  <line x1="30" y1="22" x2="26" y2="14" stroke="#FFD23F" stroke-width="1" stroke-linecap="round"/>
  <circle cx="26" cy="14" r="1.5" fill="#FFD23F"/>
  <line x1="34" y1="22" x2="38" y2="14" stroke="#FFD23F" stroke-width="1" stroke-linecap="round"/>
  <circle cx="38" cy="14" r="1.5" fill="#FFD23F"/>
</svg>