<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="honey" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD23F"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>
    <linearGradient id="wing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD23F" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FF8C00" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="textgrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD23F"/>
      <stop offset="50%" stop-color="#FFC107"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="400" rx="48" fill="#0D1117"/>

  <!-- ═══ 图标部分 (居左) ═══ -->
  <g transform="translate(40, 20) scale(0.7)">
    <!-- 外框六边形 -->
    <polygon points="256,24 464,143 464,369 256,488 48,369 48,143"
             fill="none" stroke="#FFD23F" stroke-width="3" opacity="0.4"/>
    <polygon points="256,40 452,152 452,360 256,472 60,360 60,152"
             fill="none" stroke="#FFD23F" stroke-width="1.5" opacity="0.2"/>

    <!-- 背景蜂巢网格 -->
    <g opacity="0.06" stroke="#FFD23F" stroke-width="1" fill="none">
      <polygon points="176,180 196,168 216,180 216,204 196,216 176,204"/>
      <polygon points="216,180 236,168 256,180 256,204 236,216 216,204"/>
      <polygon points="256,180 276,168 296,180 296,204 276,216 256,204"/>
      <polygon points="196,216 216,204 236,216 236,240 216,252 196,240"/>
      <polygon points="236,216 256,204 276,216 276,240 256,252 236,240"/>
      <polygon points="276,216 296,204 316,216 316,240 296,252 276,240"/>
      <polygon points="216,252 236,240 256,252 256,276 236,288 216,276"/>
      <polygon points="256,252 276,240 296,252 296,276 276,288 256,276"/>
    </g>

    <!-- 电路线路 -->
    <g stroke="#58A6FF" stroke-width="1.5" fill="none" opacity="0.35" filter="url(#glow)">
      <line x1="180" y1="220" x2="120" y2="160"/>
      <circle cx="120" cy="160" r="4" fill="#58A6FF"/>
      <line x1="332" y1="220" x2="392" y2="160"/>
      <circle cx="392" cy="160" r="4" fill="#58A6FF"/>
      <line x1="192" y1="310" x2="120" y2="370"/>
      <circle cx="120" cy="370" r="4" fill="#58A6FF"/>
      <line x1="320" y1="310" x2="392" y2="370"/>
      <circle cx="392" cy="370" r="4" fill="#58A6FF"/>
      <line x1="256" y1="195" x2="256" y2="120"/>
      <circle cx="256" cy="120" r="4" fill="#58A6FF"/>
      <line x1="256" y1="330" x2="256" y2="400"/>
      <circle cx="256" cy="400" r="4" fill="#58A6FF"/>
    </g>

    <!-- 翅膀 -->
    <ellipse cx="192" cy="230" rx="52" ry="72" transform="rotate(-20, 192, 230)"
             fill="url(#wing)" stroke="#FFD23F" stroke-width="1" opacity="0.6"/>
    <ellipse cx="320" cy="230" rx="52" ry="72" transform="rotate(20, 320, 230)"
             fill="url(#wing)" stroke="#FFD23F" stroke-width="1" opacity="0.6"/>
    <g stroke="#FFD23F" stroke-width="0.7" fill="none" opacity="0.3">
      <line x1="170" y1="200" x2="200" y2="175"/>
      <line x1="165" y1="225" x2="198" y2="210"/>
      <line x1="168" y1="250" x2="196" y2="245"/>
      <line x1="310" y1="200" x2="340" y2="175"/>
      <line x1="315" y1="225" x2="342" y2="210"/>
      <line x1="312" y1="250" x2="340" y2="245"/>
    </g>

    <!-- 蜜蜂身体 -->
    <polygon points="256,195 274,206 274,228 256,239 238,228 238,206"
             fill="url(#honey)" stroke="#FF8C00" stroke-width="1"/>
    <polygon points="256,239 278,252 278,278 256,291 234,278 234,252"
             fill="url(#honey)" stroke="#FF8C00" stroke-width="1"/>
    <polygon points="256,291 282,306 282,338 256,353 230,338 230,306"
             fill="url(#honey)" stroke="#FF8C00" stroke-width="1"/>
    <line x1="234" y1="312" x2="278" y2="312" stroke="#0D1117" stroke-width="2.5" opacity="0.4"/>
    <line x1="232" y1="326" x2="280" y2="326" stroke="#0D1117" stroke-width="2.5" opacity="0.4"/>

    <!-- 触角 -->
    <g stroke="#FFD23F" stroke-width="2" fill="none" stroke-linecap="round">
      <path d="M248,198 Q236,172 224,158"/>
      <circle cx="224" cy="158" r="5" fill="#FFD23F"/>
      <path d="M264,198 Q276,172 288,158"/>
      <circle cx="288" cy="158" r="5" fill="#FFD23F"/>
    </g>

    <!-- 漂浮小六边形 -->
    <g fill="none" stroke="#FFD23F" stroke-width="1" opacity="0.25">
      <polygon points="140,260 150,254 160,260 160,272 150,278 140,272" transform="scale(0.7) translate(60,100)"/>
      <polygon points="380,200 390,194 400,200 400,212 390,218 380,212" transform="scale(0.6) translate(200,80)"/>
      <polygon points="340,360 350,354 360,360 360,372 350,378 340,372" transform="scale(0.5) translate(280,120)"/>
    </g>
  </g>

  <!-- ═══ 文字部分 ═══ -->
  <!-- CoApis 主标题 -->
  <text x="430" y="220" font-family="'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="120" font-weight="700" fill="url(#textgrad)" letter-spacing="4">
    CoApis
  </text>
  <!-- 分隔线 -->
  <line x1="430" y1="248" x2="780" y2="248" stroke="#FFD23F" stroke-width="1.5" opacity="0.3"/>
  <!-- 副标题 -->
  <text x="430" y="290" font-family="'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="28" fill="#8B949E" letter-spacing="8" font-weight="300">
    INTELLIGENT AGENT PLATFORM
  </text>
  <!-- 底部 tagline -->
  <text x="430" y="330" font-family="'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="16" fill="#FFD23F" opacity="0.4" letter-spacing="3">
    Co-evolution · Multi-Agent · Enterprise
  </text>
</svg>