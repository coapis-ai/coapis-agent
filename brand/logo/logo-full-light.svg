<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="honey" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4940A"/>
      <stop offset="100%" stop-color="#B36B00"/>
    </linearGradient>
    <linearGradient id="wing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4940A" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#B36B00" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="textgrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4940A"/>
      <stop offset="50%" stop-color="#B8860B"/>
      <stop offset="100%" stop-color="#8B6508"/>
    </linearGradient>
  </defs>

  <!-- 白色背景 -->
  <rect width="1200" height="400" rx="48" fill="#FAFAFA" stroke="#E5E5E5" stroke-width="1"/>

  <!-- ═══ 图标部分 ═══ -->
  <g transform="translate(40, 20) scale(0.7)">
    <!-- 外框六边形 -->
    <polygon points="256,24 464,143 464,369 256,488 48,369 48,143"
             fill="none" stroke="#D4940A" stroke-width="3" opacity="0.4"/>
    <polygon points="256,40 452,152 452,360 256,472 60,360 60,152"
             fill="none" stroke="#D4940A" stroke-width="1.5" opacity="0.2"/>

    <!-- 蜂巢网格 -->
    <g opacity="0.08" stroke="#D4940A" stroke-width="1" fill="none">
      <polygon points="176,180 196,168 216,180 216,204 196,216 176,204"/>
      <polygon points="216,180 236,168 256,180 256,204 236,216 216,204"/>
      <polygon points="256,180 276,168 296,180 296,204 276,216 256,204"/>
      <polygon points="196,216 216,204 236,216 236,240 216,252 196,240"/>
      <polygon points="236,216 256,204 276,216 276,240 256,252 236,240"/>
      <polygon points="276,216 296,204 316,216 316,240 296,252 276,240"/>
      <polygon points="216,252 236,240 256,252 256,276 236,288 216,276"/>
      <polygon points="256,252 276,240 296,252 296,276 276,288 256,276"/>
    </g>

    <!-- 电路线路 -->
    <g stroke="#3B82F6" stroke-width="1.5" fill="none" opacity="0.3">
      <line x1="180" y1="220" x2="120" y2="160"/>
      <circle cx="120" cy="160" r="4" fill="#3B82F6"/>
      <line x1="332" y1="220" x2="392" y2="160"/>
      <circle cx="392" cy="160" r="4" fill="#3B82F6"/>
      <line x1="192" y1="310" x2="120" y2="370"/>
      <circle cx="120" cy="370" r="4" fill="#3B82F6"/>
      <line x1="320" y1="310" x2="392" y2="370"/>
      <circle cx="392" cy="370" r="4" fill="#3B82F6"/>
      <line x1="256" y1="195" x2="256" y2="120"/>
      <circle cx="256" cy="120" r="4" fill="#3B82F6"/>
      <line x1="256" y1="330" x2="256" y2="400"/>
      <circle cx="256" cy="400" r="4" fill="#3B82F6"/>
    </g>

    <!-- 翅膀 -->
    <ellipse cx="192" cy="230" rx="52" ry="72" transform="rotate(-20, 192, 230)"
             fill="url(#wing)" stroke="#D4940A" stroke-width="1" opacity="0.5"/>
    <ellipse cx="320" cy="230" rx="52" ry="72" transform="rotate(20, 320, 230)"
             fill="url(#wing)" stroke="#D4940A" stroke-width="1" opacity="0.5"/>
    <g stroke="#D4940A" stroke-width="0.7" fill="none" opacity="0.25">
      <line x1="170" y1="200" x2="200" y2="175"/>
      <line x1="165" y1="225" x2="198" y2="210"/>
      <line x1="168" y1="250" x2="196" y2="245"/>
      <line x1="310" y1="200" x2="340" y2="175"/>
      <line x1="315" y1="225" x2="342" y2="210"/>
      <line x1="312" y1="250" x2="340" y2="245"/>
    </g>

    <!-- 蜜蜂身体 -->
    <polygon points="256,195 274,206 274,228 256,239 238,228 238,206"
             fill="url(#honey)" stroke="#8B6508" stroke-width="1"/>
    <polygon points="256,239 278,252 278,278 256,291 234,278 234,252"
             fill="url(#honey)" stroke="#8B6508" stroke-width="1"/>
    <polygon points="256,291 282,306 282,338 256,353 230,338 230,306"
             fill="url(#honey)" stroke="#8B6508" stroke-width="1"/>
    <line x1="234" y1="312" x2="278" y2="312" stroke="#FAFAFA" stroke-width="2.5" opacity="0.5"/>
    <line x1="232" y1="326" x2="280" y2="326" stroke="#FAFAFA" stroke-width="2.5" opacity="0.5"/>

    <!-- 触角 -->
    <g stroke="#D4940A" stroke-width="2" fill="none" stroke-linecap="round">
      <path d="M248,198 Q236,172 224,158"/>
      <circle cx="224" cy="158" r="5" fill="#D4940A"/>
      <path d="M264,198 Q276,172 288,158"/>
      <circle cx="288" cy="158" r="5" fill="#D4940A"/>
    </g>
  </g>

  <!-- ═══ 文字部分 ═══ -->
  <text x="430" y="220" font-family="'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="120" font-weight="700" fill="url(#textgrad)" letter-spacing="4">
    CoApis
  </text>
  <line x1="430" y1="248" x2="780" y2="248" stroke="#D4940A" stroke-width="1.5" opacity="0.3"/>
  <text x="430" y="290" font-family="'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="28" fill="#6B7280" letter-spacing="8" font-weight="300">
    INTELLIGENT AGENT PLATFORM
  </text>
  <text x="430" y="330" font-family="'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="16" fill="#D4940A" opacity="0.4" letter-spacing="3">
    Co-evolution · Multi-Agent · Enterprise
  </text>
</svg>